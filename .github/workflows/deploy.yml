name: Deploy Frontend (Dev)

on:
  workflow_run:
    workflows: ["Tests"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-dev:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies (fresh resolve for Linux platform)
        run: rm -f bun.lock package-lock.json && bun install

      - name: Create .env.development file
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL_DEV }}" > .env.development
          echo "VITE_RAZORPAY_KEY_ID=${{ secrets.VITE_RAZORPAY_KEY_ID_DEV }}" >> .env.development
          echo "VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN_DEV }}" >> .env.development
          echo "VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID_DEV }}" >> .env.development
          echo "VITE_EXTRACT_TRADES_URL=${{ secrets.VITE_EXTRACT_TRADES_URL_DEV }}" >> .env.development

      - name: Build for dev
        run: bun run build:dev

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://tradequt.com-dev --delete
          aws s3 cp s3://tradequt.com-dev/index.html s3://tradequt.com-dev/index.html \
            --metadata-directive REPLACE \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
          aws s3 cp s3://tradequt.com-dev/assets/ s3://tradequt.com-dev/assets/ \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "*.js" \
            --content-type "application/javascript"
          aws s3 cp s3://tradequt.com-dev/assets/ s3://tradequt.com-dev/assets/ \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "*.css" \
            --content-type "text/css"

      - name: Invalidate CloudFront
        continue-on-error: true
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID_DEV }} \
            --paths "/*"
