name: Deploy Frontend (Prod - Manual)

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type "deploy-to-production" to confirm'
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate-confirmation:
    runs-on: ubuntu-latest
    steps:
      - name: Validate confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "deploy-to-production" ]; then
            echo "::error::Confirmation text does not match. Deployment cancelled."
            exit 1
          fi

  deploy-prod:
    runs-on: ubuntu-latest
    needs: validate-confirmation
    environment: prod

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies (fresh resolve for Linux platform)
        run: rm -f bun.lock package-lock.json && bun install

      - name: Create .env.production file
        run: |
          echo "VITE_API_URL=${{ secrets.VITE_API_URL_PROD }}" > .env.production
          echo "VITE_RAZORPAY_KEY_ID=${{ secrets.VITE_RAZORPAY_KEY_ID_PROD }}" >> .env.production
          echo "VITE_EXTRACT_TRADES_URL=${{ secrets.VITE_EXTRACT_TRADES_URL_PROD }}" >> .env.production
          echo "VITE_GENERATE_INSIGHTS_URL=${{ secrets.VITE_GENERATE_INSIGHTS_URL_PROD }}" >> .env.production
          echo "VITE_COGNITO_DOMAIN=${{ secrets.VITE_COGNITO_DOMAIN_PROD }}" >> .env.production
          echo "VITE_COGNITO_CLIENT_ID=${{ secrets.VITE_COGNITO_CLIENT_ID_PROD }}" >> .env.production

      - name: Build for production
        run: bun run build
        env:
          NODE_ENV: production

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: |
          aws s3 sync ./dist s3://tradequt.com-prod --delete
          aws s3 cp s3://tradequt.com-prod/index.html s3://tradequt.com-prod/index.html \
            --metadata-directive REPLACE \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"
          aws s3 cp s3://tradequt.com-prod/assets/ s3://tradequt.com-prod/assets/ \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "*.js" \
            --content-type "application/javascript"
          aws s3 cp s3://tradequt.com-prod/assets/ s3://tradequt.com-prod/assets/ \
            --recursive \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*" --include "*.css" \
            --content-type "text/css"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CF_DISTRIBUTION_ID_PROD }} \
            --paths "/*"
