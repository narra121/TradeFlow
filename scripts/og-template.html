<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
    font-family: system-ui, -apple-system, sans-serif;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .content {
    text-align: center;
    z-index: 2;
    position: relative;
  }
  .logo {
    font-size: 80px;
    font-weight: 800;
    letter-spacing: -3px;
    margin-bottom: 20px;
    line-height: 1;
  }
  .logo span {
    color: #3b82f6;
  }
  .tagline {
    font-size: 32px;
    color: #94a3b8;
    font-weight: 400;
    letter-spacing: 1px;
  }
  .chart {
    position: absolute;
    bottom: 60px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0.12;
  }
  .glow {
    position: absolute;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }
</style>
</head>
<body>
  <div class="glow"></div>
  <div class="content">
    <div class="logo">Trade<span>Qut</span></div>
    <div class="tagline">Professional Trading Journal</div>
  </div>
  <div class="chart">
    <svg width="900" height="200" viewBox="0 0 900 200">
      <polyline fill="none" stroke="#3b82f6" stroke-width="2.5"
        points="0,160 60,140 120,150 180,100 240,120 300,70 360,90 420,50 480,80 540,40 600,65 660,30 720,55 780,25 840,45 900,20" />
      <polyline fill="none" stroke="#22c55e" stroke-width="2" stroke-dasharray="6,4"
        points="0,170 60,155 120,145 180,130 240,120 300,105 360,95 420,85 480,75 540,65 600,55 660,50 720,45 780,40 840,35 900,30" />
    </svg>
  </div>
</body>
</html>
